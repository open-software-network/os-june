<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Connector QA Preview</title>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    // ---------------------------------------------------------------------------
    // Tauri IPC bridge fake — must be installed before the app module loads.
    // ---------------------------------------------------------------------------

    // IPC call log for QA assertions
    window.__IPC_LOG__ = [];

    // Event listener registry: event name -> array of { id, handler }
    window.__TAURI_LISTENERS__ = {};
    let __nextCbId = 1;
    const __callbacks__ = {};

    // Scenario state — overridable from the driver via __APP_PREVIEW__.setScenario()
    window.__SCENARIO__ = { githubStatus: "disconnected" };

    // GitHub account DTO shapes
    const GITHUB_CONNECTED_ACCOUNT = {
      accountId: "12345678",
      provider: "github",
      email: "sarascahya",
      scopes: ["read", "write"],
      status: "connected",
      workspaceName: null,
      workspaceUrlKey: null,
      selectedTeams: [],
    };

    const GITHUB_RECONNECT_ACCOUNT = {
      accountId: "12345678",
      provider: "github",
      email: "sarascahya",
      scopes: ["read"],
      status: "reconnect_required",
      workspaceName: null,
      workspaceUrlKey: null,
      selectedTeams: [],
    };

    function buildConnectorsList() {
      const status = window.__SCENARIO__.githubStatus;
      if (status === "disconnected") return [];
      if (status === "connected") return [GITHUB_CONNECTED_ACCOUNT];
      if (status === "reconnect_required") return [GITHUB_RECONNECT_ACCOUNT];
      return [];
    }

    window.__TAURI_INTERNALS__ = {
      transformCallback(cb, _once) {
        const id = __nextCbId++;
        __callbacks__[id] = cb;
        return id;
      },
      unregisterCallback(id) {
        delete __callbacks__[id];
      },
      convertFileSrc(p) {
        return p;
      },
      async invoke(cmd, args = {}) {
        console.log("[IPC] invoke:", cmd, JSON.stringify(args));
        window.__IPC_LOG__.push({ cmd, args: JSON.parse(JSON.stringify(args)) });

        // Plugin event system
        if (cmd === "plugin:event|listen") {
          const event = args.event;
          const handlerId = args.handler;
          if (!window.__TAURI_LISTENERS__[event]) {
            window.__TAURI_LISTENERS__[event] = [];
          }
          const entry = { id: handlerId, handler: __callbacks__[handlerId] };
          window.__TAURI_LISTENERS__[event].push(entry);
          return handlerId;
        }
        if (cmd === "plugin:event|unlisten") {
          const event = args.event;
          if (window.__TAURI_LISTENERS__[event]) {
            window.__TAURI_LISTENERS__[event] = window.__TAURI_LISTENERS__[event].filter(
              (e) => e.id !== args.eventId
            );
          }
          return null;
        }
        if (cmd === "plugin:event|emit") {
          return null;
        }

        // Boot / account stubs
        if (cmd === "bootstrap_app") {
          return { folders: [], notes: [], activeRecoveries: [], providerConfigured: true };
        }
        if (cmd === "os_accounts_status_local") {
          return {
            signedIn: true,
            configured: true,
            user: { id: "u1", handle: "sarascahya", email: "sarascahya@gmail.com" },
          };
        }
        if (cmd === "os_accounts_status") {
          return {
            signedIn: true,
            configured: true,
            user: { id: "u1", handle: "sarascahya", email: "sarascahya@gmail.com" },
            balance: { credits: 1000, usdMillis: 500 },
          };
        }
        if (cmd === "sticky_active_profile") return "default";
        if (cmd === "list_folders") return [];
        if (cmd === "list_notes") return { items: [], nextCursor: undefined };
        if (cmd === "list_session_folders") return [];
        if (cmd === "list_completed_sessions") return [];
        if (cmd === "memory_settings") return { enabled: true };
        if (cmd === "provider_model_settings") {
          return {
            settings: {
              transcriptionProvider: "local",
              generationProvider: "local",
              transcriptionModel: "whisper",
              generationModel: "local",
              costQuality: 0.5,
              remoteGenerationModel: "claude",
              imageModel: "stable-diffusion",
              videoModel: "sora",
              veniceApiKeyConfigured: false,
              localGeneration: { baseUrl: "", modelId: "", apiKey: "" },
              imageSafeMode: true,
              imageSafeModePromptDismissed: false,
            },
            effectiveSettings: {
              transcriptionProvider: "local",
              generationProvider: "local",
              transcriptionModel: "whisper",
              generationModel: "local",
              costQuality: 0.5,
              remoteGenerationModel: "claude",
              imageModel: "stable-diffusion",
              videoModel: "sora",
              veniceApiKeyConfigured: false,
              localGeneration: { baseUrl: "", modelId: "", apiKey: "" },
              imageSafeMode: true,
              imageSafeModePromptDismissed: false,
            },
          };
        }
        if (cmd === "hermes_bridge_status") {
          return { running: false };
        }
        if (cmd === "agent_open_ready") return null;
        if (cmd === "dictation_capabilities") {
          return {
            capabilities: {
              available: false,
              platform: "macos",
              shortcuts: false,
              paste: false,
              microphoneSelection: false,
              accessibilityPermission: false,
              systemAudio: false,
            },
          };
        }
        if (cmd === "dictation_settings") {
          return {
            settings: {
              pushToTalkShortcut: {
                code: "KeyD",
                modifiers: { command: false, control: false, option: false, shift: false, function: false },
                label: "D",
                pressCount: 2,
              },
              toggleShortcut: {
                code: "KeyD",
                modifiers: { command: false, control: false, option: false, shift: false, function: false },
                label: "D",
                pressCount: 1,
              },
              microphone: {},
              style: "standard",
            },
          };
        }
        if (cmd === "p3a_settings") return { settings: { enabled: false, consentVersion: 0 } };
        if (cmd === "list_agent_tasks") return { items: [] };
        if (cmd === "list_memories") return [];
        if (cmd === "list_session_profiles") return [];
        if (cmd === "hermes_bridge_skills") return [];
        if (cmd === "hermes_bridge_toolsets") return [];
        if (cmd === "hermes_bridge_sessions") return { sessions: [] };
        if (cmd === "hermes_bridge_cron_jobs") return [];
        if (cmd === "hermes_bridge_messaging_platforms") return { platforms: [] };
        if (cmd === "hermes_bridge_filesystem_snapshot") return { roots: [] };
        if (cmd === "hermes_agent_cli_access") return { enabled: false };
        if (cmd === "hermes_browser_access") return { enabled: false };
        if (cmd === "browser_transport_policy") {
          return { attendedEnabled: false, managedEnabled: false };
        }
        if (cmd === "extension_pairing_status") {
          return { paired: false, listenerRunning: false };
        }
        if (cmd === "june_character") {
          return { character: "", isCustom: false, defaultCharacter: "", path: "" };
        }
        if (cmd === "computer_use_status") {
          return {
            platformSupported: false,
            planEligible: false,
            grantEnabled: false,
            driverAvailable: false,
            accessibility: false,
            screenRecording: false,
            modelSupportsVision: false,
            generationModel: "claude",
            ready: false,
            state: "off",
          };
        }

        // Connectors commands
        if (cmd === "connectors_list") {
          return buildConnectorsList();
        }
        if (cmd === "obsidian_status") {
          return { connected: false };
        }
        if (cmd === "connectors_connect") {
          console.log("[IPC] connectors_connect payload:", JSON.stringify(args));
          // Return a fake connected account
          return {
            accountId: "12345678",
            provider: args.request?.provider || "github",
            email: "sarascahya",
            scopes: (args.request?.scopes || []).flatMap((b) => {
              if (b === "github_read") return ["read"];
              if (b === "github_write") return ["write"];
              return [b];
            }),
            status: "connected",
            workspaceName: null,
            workspaceUrlKey: null,
            selectedTeams: [],
          };
        }
        if (cmd === "connectors_cancel_connect") return null;
        if (cmd === "connectors_apply_runtime") return null;
        if (cmd === "connectors_disconnect") {
          console.log("[IPC] connectors_disconnect payload:", JSON.stringify(args));
          return null;
        }
        if (cmd === "connectors_linear_teams") {
          return { teams: [], truncated: false };
        }
        if (cmd === "connectors_selected_teams_set") return buildConnectorsList()[0] ?? null;
        if (cmd === "notion_connector_status") {
          return {
            connected: false, accountId: "", endpoint: "", preview: false,
            selectedResourceScopingVerified: false, accessTokenPresent: false,
            refreshTokenPresent: false, clientIdPresent: false, keychainOnly: false,
          };
        }
        if (cmd === "notion_connector_connect") return { accountId: "n1", endpoint: "", preview: false, selectedResourceScopingVerified: false };
        if (cmd === "notion_connector_disconnect") return null;
        if (cmd === "notion_connector_cancel_connect") return null;
        if (cmd === "obsidian_configure") return { connected: true, vaultPath: "/tmp/vault", vaultName: "Vault" };
        if (cmd === "obsidian_disconnect") return { connected: false };
        if (cmd === "routine_trust_list") return { items: [] };
        if (cmd === "routine_trust_set") return { trustMode: "read_only", approvalRunCount: 0, autonomousTools: [] };
        if (cmd === "connector_triggers_list") return [];
        if (cmd === "connector_approvals_list") return [];
        if (cmd === "computer_use_approvals_list") return [];
        if (cmd === "set_hermes_browser_access") return { enabled: false };
        if (cmd === "hermes_list_skill_bundles") return [];
        if (cmd === "hermes_skill_tap_list") return { ok: true, taps: [], message: null, timedOut: false };
        if (cmd === "hermes_inspect_external_dirs") return [];
        if (cmd === "os_accounts_referral_summary") return null;
        if (cmd === "check_recording_source_readiness") return { sourceMode: "microphoneOnly", ready: false, sources: [] };
        if (cmd === "profile_data_summary") return { notes: 0, dictation: 0, folders: 0, sessions: 0, memories: 0 };
        if (cmd === "p3a_question_catalog") return { questions: [] };
        if (cmd === "list_venice_models") return { mode: "generation", modelType: "text", selectedModel: "", models: [] };
        if (cmd === "discover_claude_projects") return [];
        if (cmd === "profile_model_overrides") return null;
        if (cmd === "integration_health_status") return null;
        if (cmd === "set_june_character") return { character: "", isCustom: false, defaultCharacter: "", path: "" };

        console.warn("[IPC] unhandled invoke:", cmd, args);
        return null;
      },
    };

    // @tauri-apps/api >= v2.11: listener teardown
    window.__TAURI_EVENT_PLUGIN_INTERNALS__ = {
      unregisterListener(event, eventId) {
        if (window.__TAURI_LISTENERS__[event]) {
          window.__TAURI_LISTENERS__[event] = window.__TAURI_LISTENERS__[event].filter(
            (e) => e.id !== eventId
          );
        }
      },
    };

    // ---------------------------------------------------------------------------
    // App preview control surface
    // ---------------------------------------------------------------------------
    window.__APP_PREVIEW__ = {
      /** Change scenario and optionally fire a connectors-changed event */
      setScenario(scenario) {
        Object.assign(window.__SCENARIO__, scenario);
        console.log("[PREVIEW] scenario updated:", JSON.stringify(window.__SCENARIO__));
      },
      /** Fire the june://connectors-changed event to trigger a refresh */
      fireConnectorsChanged() {
        const listeners = window.__TAURI_LISTENERS__["june://connectors-changed"] ?? [];
        for (const { handler } of listeners) {
          try { handler({ event: "june://connectors-changed", payload: null, id: 0 }); } catch {}
        }
        console.log("[PREVIEW] fired june://connectors-changed to", listeners.length, "listeners");
      },
      /** Fire june://open-settings to open the settings panel */
      openSettings() {
        const listeners = window.__TAURI_LISTENERS__["june://open-settings"] ?? [];
        for (const { handler } of listeners) {
          try { handler({ event: "june://open-settings", payload: null, id: 0 }); } catch {}
        }
      },
      /** Get IPC log entries */
      getIpcLog() { return window.__IPC_LOG__; },
      clearIpcLog() { window.__IPC_LOG__ = []; },
    };

    // ---------------------------------------------------------------------------
    // Skip first-run gates
    // ---------------------------------------------------------------------------
    localStorage.setItem("june.onboarding.completedVersion", "8");

    // ---------------------------------------------------------------------------
    // Load the app (dynamic import ensures the bridge is installed first)
    // ---------------------------------------------------------------------------
    await import("/src/main.tsx");
  </script>
</body>
</html>
