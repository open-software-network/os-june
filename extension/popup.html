<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>June</title>
    <link rel="stylesheet" href="/src/tokens.css" />
    <style>
      body {
        font-family: var(--font-sans);
        font-size: var(--fs-md);
        font-synthesis: none;
        margin: 0;
        min-width: var(--extension-popup-min-w);
        padding: var(--sp-5) var(--sp-6);
        color: var(--foreground);
        background: var(--card);
      }
      h1 {
        font-size: var(--fs-md);
        font-weight: var(--fw-medium);
        margin: 0 0 var(--sp-2);
      }
      p {
        margin: 0;
        color: var(--muted-foreground);
      }
      .tab-share {
        margin-top: var(--sp-5);
        padding-top: var(--sp-4);
      }
      .tab-share p {
        overflow-wrap: anywhere;
      }
      .status-dot {
        display: inline-block;
        width: var(--sp-3);
        height: var(--sp-3);
        border-radius: var(--r-pill);
        margin-right: var(--sp-2);
        background: var(--muted-foreground);
      }
      .status-dot[data-status="paired"] {
        background: var(--success);
      }
      .status-dot[data-status="incompatible"],
      .status-dot[data-status="unreachable"] {
        background: var(--destructive);
      }
      button {
        margin-top: var(--sp-4);
        font: inherit;
        padding: var(--sp-1) var(--sp-4);
        border: 0;
        border-radius: var(--r-sm);
        background: var(--secondary);
        box-shadow: var(--shadow-inset);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1><span id="dot" class="status-dot"></span><span id="title">June</span></h1>
    <p id="detail">Checking connection...</p>
    <button id="retry" type="button" hidden>Try again</button>
    <section id="tab-share" class="tab-share" hidden>
      <h1>Share this tab</h1>
      <p id="share-detail">Only the tab you choose becomes available to the current June task.</p>
      <button id="share" type="button">Share this tab</button>
      <button id="revoke-share" type="button" hidden>Stop sharing</button>
    </section>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
