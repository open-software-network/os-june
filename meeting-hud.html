<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OS Scribe Recording</title>
  </head>
  <body>
    <div
      id="mhud"
      class="mhud"
      data-state="recording"
      data-orient="horizontal"
      role="button"
      tabindex="0"
      aria-label="Recording — click to open Scribe"
    >
      <span class="mhud-dot" aria-hidden="true"></span>
      <div class="mhud-bars" aria-hidden="true">
        <span class="mhud-bar"></span>
        <span class="mhud-bar"></span>
        <span class="mhud-bar"></span>
        <span class="mhud-bar"></span>
        <span class="mhud-bar"></span>
        <span class="mhud-bar"></span>
        <span class="mhud-bar"></span>
      </div>
    </div>
    <script type="module" src="/src/meeting-hud.ts"></script>
  </body>
</html>
