<!doctype html>
<!--
  Dev-only Hermes admin preview. Runs the real app shell in a plain browser by
  faking the Tauri IPC bridge inline, so the ported Hermes admin surfaces (MCP
  servers, Skills hub, Toolsets, Installed skills) render and can be driven
  without a live Hermes daemon or the Tauri webview.

  How it works: every admin surface routes its I/O through ONE Tauri command,
  `hermes_admin_request` ({ mode, method, path, body }). We intercept that at the
  `window.__TAURI_INTERNALS__.invoke` boundary and forward it to the repo's own
  test double, `FakeHermesServer` (the same fake the vitest suite injects), so
  the responses already match the shapes the hooks parse. Boot-level commands
  (bootstrap_app, hermes_bridge_status, os_accounts_status, ...) are stubbed so
  the signed-in main shell mounts.

  Nothing here ships: vite builds only index.html (see vite.config.ts inputs),
  and no app code references this file.

  Usage:
    pnpm dev
    open http://127.0.0.1:1421/admin-preview.html

  URL params (for scripted screenshots): ?theme=dark|light

  Test hooks exposed on window.__ADMIN_PREVIEW__:
    openSettings()        emit the open-settings menu event
    emitEvent(name, p)    push a backend event to the app
    server                the FakeHermesServer instance (mutate scenario state)
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>June Hermes admin preview</title>
    <script>
      // Pre-paint theme bootstrap, same as index.html (plus a ?theme= override
      // so scripted screenshots can pick a theme per URL).
      (function () {
        try {
          var stored =
            new URLSearchParams(location.search).get("theme") ||
            localStorage.getItem("os-june:theme");
          var resolved =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {}
      })();
    </script>
    <script type="module">
      // The bridge must be installed before the app module loads so
      // @tauri-apps/api finds window.__TAURI_INTERNALS__. We set it up, then
      // dynamically import main.tsx at the end of this module.
      import { FakeHermesServer } from "/src/test/fixtures/fake-hermes-server.ts";
      import {
        richInstallScenario,
        hubBrowseScenario,
      } from "/src/test/fixtures/hermes-admin-scenarios.ts";

      // richInstallScenario already populates all three surfaces (skills,
      // toolsets, mcpServers, mcpCatalog, hubResults); overlay hubBrowse's
      // richer hub results (trust levels, tags, versions) + its install
      // progression for a fuller Skills hub screen.
      const rich = richInstallScenario();
      const hub = hubBrowseScenario();
      const scenario = {
        ...rich,
        hubResults: hub.hubResults,
        backgroundActions: hub.backgroundActions,
        actionScripts: hub.actionScripts,
      };
      const server = new FakeHermesServer(scenario);

      // Land in the signed-in main shell: skip the first-run wizard.
      try {
        localStorage.setItem("june.onboarding.completedVersion", "7");
        localStorage.removeItem("june.onboarding.resumeStep");
      } catch (e) {}

      const callbacks = new Map();
      const listeners = new Map();
      let nextId = 1;

      function emitEvent(name, payload) {
        const ids = listeners.get(name);
        if (!ids) return;
        for (const id of ids) {
          const cb = callbacks.get(id);
          if (cb) cb({ event: name, id: 0, payload });
        }
      }

      const stubUser = { id: "u1", handle: "sam", displayName: "Sam Carter" };
      let account = {
        signedIn: true,
        configured: true,
        user: stubUser,
        balance: { credits: 5000, usdMillis: 5000, usageRemainingPercent: 100 },
        subscription: { subscribed: false },
      };

      // A sandboxed connection so adminTargetForMode("sandboxed") resolves a
      // target (it picks the connection with fullMode === false + a baseUrl).
      // The Rust transport ignores baseUrl/token, but the shape must be whole.
      const connection = {
        baseUrl: server.baseUrl,
        wsUrl: `${server.baseUrl.replace("http", "ws")}/api/ws`,
        token: server.token,
        port: 65535,
        command: "hermes",
        hermesHome: "/tmp/fake-hermes-home",
        cwd: null,
        providerProxyPort: 1,
        pid: 1234,
        sandboxed: true,
        fullMode: false,
      };

      window.__ADMIN_PREVIEW__ = {
        server,
        emitEvent,
        openSettings: () => emitEvent("june://open-settings", null),
      };

      // @tauri-apps/api v2.11 routes listener teardown through a SEPARATE global
      // (not __TAURI_INTERNALS__). Without it, every listen() cleanup throws on
      // React 18 StrictMode's mount→unmount→mount cycle and the render aborts.
      window.__TAURI_EVENT_PLUGIN_INTERNALS__ = {
        unregisterListener(event, eventId) {
          const ids = listeners.get(event);
          if (ids) ids.delete(eventId);
          callbacks.delete(eventId);
        },
      };

      window.__TAURI_INTERNALS__ = {
        transformCallback(cb) {
          const id = nextId++;
          callbacks.set(id, cb);
          return id;
        },
        unregisterCallback(id) {
          callbacks.delete(id);
        },
        convertFileSrc(p) {
          return p;
        },
        async invoke(cmd, args = {}) {
          switch (cmd) {
            case "plugin:event|listen": {
              if (!listeners.has(args.event)) {
                listeners.set(args.event, new Set());
              }
              listeners.get(args.event).add(args.handler);
              return args.handler;
            }
            case "plugin:event|unlisten":
              return null;

            // --- account / boot ---
            case "os_accounts_status":
              return account;
            case "os_accounts_login":
              return account;
            case "os_accounts_logout":
              account = { signedIn: false, configured: true };
              return null;
            case "bootstrap_app":
              return {
                folders: [],
                notes: [],
                activeRecoveries: [],
                providerConfigured: true,
              };
            case "create_note": {
              // The empty-notes shell auto-creates a first draft; a null here
              // crashes the notes reducer (toListItem reads note.id).
              const now = new Date().toISOString();
              return {
                id: `draft-${nextId++}`,
                title: "",
                preview: "",
                processingStatus: "draft",
                folderIds: [],
                createdAt: now,
                updatedAt: now,
                durationMs: 0,
              };
            }

            // --- shell data the main view loads at boot (null here would make
            // the reducers/iterators throw the global error toasts) ---
            case "list_session_folders":
            case "list_folders":
              return [];
            case "list_agent_tasks":
              return { items: [] };
            case "hermes_bridge_sessions":
              return { sessions: [], items: [], total: 0, limit: 100, offset: 0 };
            case "hermes_agent_cli_access":
              return { enabled: false };
            case "hermes_bridge_messaging_platforms":
              return { platforms: [] };
            case "hermes_bridge_filesystem_snapshot":
              return { roots: [] };

            // --- Hermes bridge ---
            case "hermes_bridge_status":
              return {
                running: true,
                connection,
                connections: [connection],
              };
            case "ensure_hermes_bridge_gateway":
              return null;

            // --- the one admin transport every surface routes through ---
            case "hermes_admin_request": {
              const method = (args.method ?? "GET").toUpperCase();
              // FakeHermesServer.fetch does `new URL(input)`, so it needs an
              // absolute URL; the Rust transport only forwards path+query.
              const res = await server.fetch(`${server.baseUrl}${args.path}`, {
                method,
                headers: { "X-Hermes-Session-Token": server.token },
                body:
                  args.body === undefined || args.body === null
                    ? undefined
                    : JSON.stringify(args.body),
              });
              const text = await res.text();
              if (res.ok) return text ? JSON.parse(text) : null;
              // Mirror the Rust proxy: a non-2xx Hermes response throws an Err
              // whose message the TS transport parses back into status + body.
              throw new Error(`Hermes API returned ${res.status}: ${text}`);
            }

            default:
              return null;
          }
        },
      };

      // Bridge ready — boot the real app.
      await import("/src/main.tsx");
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
