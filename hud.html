<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OS Scribe Dictation</title>
  </head>
  <body>
    <div id="hud" class="hud" data-state="idle">
      <span id="hud-handle" class="hud-handle" aria-label="Drag dictation HUD">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle cx="9" cy="5" r="2" />
          <circle cx="15" cy="5" r="2" />
          <circle cx="9" cy="12" r="2" />
          <circle cx="15" cy="12" r="2" />
          <circle cx="9" cy="19" r="2" />
          <circle cx="15" cy="19" r="2" />
        </svg>
      </span>
      <div class="hud-viz">
        <div class="hud-bars" aria-hidden="true">
          <span class="hud-bar"></span>
          <span class="hud-bar"></span>
          <span class="hud-bar"></span>
          <span class="hud-bar"></span>
          <span class="hud-bar"></span>
        </div>
        <span id="hud-braille" class="hud-braille" aria-hidden="true"></span>
        <span class="hud-error-mark" aria-hidden="true"></span>
      </div>
      <span
        id="hud-error-text"
        class="hud-error-text"
        aria-hidden="true"
      ></span>
      <div id="hud-meeting" class="hud-meeting" aria-live="polite">
        <div class="hud-meeting-copy">
          <span id="hud-meeting-app" class="hud-meeting-app">Meeting app</span>
          <span class="hud-meeting-question">Transcribe this meeting?</span>
        </div>
        <div class="hud-meeting-actions">
          <button
            id="hud-meeting-start"
            class="hud-meeting-button hud-meeting-start"
            type="button"
            aria-label="Start meeting transcription"
            title="Start"
          >
            <span class="hud-meeting-start-glyph" aria-hidden="true"></span>
          </button>
          <button
            id="hud-meeting-dismiss"
            class="hud-meeting-button hud-meeting-dismiss"
            type="button"
            aria-label="Dismiss meeting prompt"
            title="Dismiss"
          >
            <span class="hud-meeting-dismiss-glyph" aria-hidden="true"></span>
          </button>
        </div>
      </div>
      <button
        id="hud-stop"
        class="hud-stop"
        type="button"
        aria-label="Stop dictation"
      >
        <span class="hud-stop-glyph" aria-hidden="true"></span>
      </button>
      <span id="hud-status" class="hud-status">Idle</span>
    </div>
    <script type="module" src="/src/hud.ts"></script>
  </body>
</html>
