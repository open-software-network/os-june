<!doctype html>
<!--
  Dev-only onboarding preview. Runs the real wizard in a plain browser by
  faking the Tauri IPC bridge inline: signed in, permissions grant on
  request, and "checkout" completes 4 seconds after you click Start free
  trial so the activation moment is watchable. Nothing here ships: vite
  builds only index.html, and no app code references this file.

  Usage:
    npm run dev
    open http://localhost:1421/onboarding-preview.html

  Console helpers once it's open:
    june.replayOnboarding()            restart the wizard from step 1
    june.replayOnboarding("trial")     jump to a step (sign-in, privacy,
                                       data-practices, permissions, setup,
                                       trial, dictation-practice,
                                       meeting-notes, agent-intro,
                                       agent-honesty, finish)
    __JUNE_STUB__.signOut()            see the signed-out welcome pitch
    localStorage.setItem("os-scribe:theme", "dark"); location.reload()
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>June onboarding preview</title>
    <script>
      // Pre-paint theme bootstrap, same as index.html.
      (function () {
        try {
          var stored = localStorage.getItem("os-scribe:theme");
          var resolved =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {}
      })();
    </script>
    <script>
      // Fake Tauri bridge. Must run before the app module so
      // @tauri-apps/api finds window.__TAURI_INTERNALS__ at import time.
      (() => {
        const callbacks = new Map();
        const listeners = new Map();
        let nextId = 1;

        function emitEvent(name, payload) {
          const ids = listeners.get(name);
          if (!ids) return;
          for (const id of ids) {
            const cb = callbacks.get(id);
            if (cb) cb({ event: name, id: 0, payload });
          }
        }

        // The wizard always replays in the preview.
        try {
          localStorage.removeItem("june.onboarding.completedVersion");
        } catch (e) {}

        let account = {
          signedIn: true,
          configured: true,
          user: { id: "u1", handle: "you", displayName: "June Tester" },
          subscription: { subscribed: false },
        };

        window.__JUNE_STUB__ = {
          emitEvent,
          setSubscribed(status) {
            account = {
              ...account,
              subscription: { subscribed: true, status },
            };
          },
          signOut() {
            account = { signedIn: false, configured: true };
            location.reload();
          },
        };

        window.__TAURI_INTERNALS__ = {
          transformCallback(cb) {
            const id = nextId++;
            callbacks.set(id, cb);
            return id;
          },
          unregisterCallback(id) {
            callbacks.delete(id);
          },
          convertFileSrc(p) {
            return p;
          },
          async invoke(cmd, args = {}) {
            switch (cmd) {
              case "plugin:event|listen": {
                if (!listeners.has(args.event)) {
                  listeners.set(args.event, new Set());
                }
                listeners.get(args.event).add(args.handler);
                return args.handler;
              }
              case "plugin:event|unlisten":
                return null;
              case "os_accounts_status":
                return account;
              case "os_accounts_login":
                account = {
                  signedIn: true,
                  configured: true,
                  user: {
                    id: "u1",
                    handle: "you",
                    displayName: "June Tester",
                  },
                  subscription: { subscribed: false },
                };
                return account;
              case "os_accounts_start_trial_checkout":
                // Pretend the user finishes Stripe checkout 4s from now;
                // the wizard's poll notices and shows the activated screen.
                setTimeout(
                  () => window.__JUNE_STUB__.setSubscribed("trialing"),
                  4000,
                );
                return { outcome: "checkoutOpened" };
              case "dictation_settings":
                return {
                  settings: {
                    pushToTalkShortcut: {
                      code: "Fn",
                      label: "fn",
                      pressCount: 1,
                      modifiers: {
                        command: false,
                        control: false,
                        option: false,
                        shift: false,
                        function: true,
                      },
                    },
                    toggleShortcut: null,
                    microphone: {},
                    style: "standard",
                    language: "",
                  },
                };
              case "dictation_helper_command": {
                const type = args.command && args.command.type;
                if (
                  type === "get_permission_status" ||
                  type === "request_microphone_permission" ||
                  type === "request_accessibility_permission"
                ) {
                  setTimeout(() => {
                    emitEvent(
                      "dictation-event",
                      JSON.stringify({
                        type: "permission_status",
                        payload: {
                          microphone: "granted",
                          accessibility: "granted",
                        },
                      }),
                    );
                  }, 150);
                }
                return null;
              }
              default:
                return null;
            }
          },
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
