name: june-api

on:
  pull_request:
    paths:
      - "june-api/**"
      - ".github/workflows/june-api.yml"
      - ".github/actions/setup-rust/**"
      - ".github/actions/changed-paths/**"
  push:
    branches: [main]
    paths:
      - "june-api/**"
      - ".github/workflows/june-api.yml"
      - ".github/actions/setup-rust/**"
      - ".github/actions/changed-paths/**"

permissions:
  contents: read

concurrency:
  group: june-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: cargo fmt
        working-directory: june-api
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: cargo clippy
        working-directory: june-api
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: cargo test
        working-directory: june-api
        env:
          RUST_BACKTRACE: 1
        run: cargo test --all-targets --all-features --locked
