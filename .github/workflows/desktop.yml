name: desktop

on:
  pull_request:
    paths:
      - ".github/workflows/desktop.yml"
      - "hud.html"
      - "index.html"
      - "meeting-hud.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
      - "tsconfig.json"
      - "vite.config.ts"
  push:
    branches: [main]
    paths:
      - ".github/workflows/desktop.yml"
      - "hud.html"
      - "index.html"
      - "meeting-hud.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
      - "tsconfig.json"
      - "vite.config.ts"

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Vitest
        run: pnpm test

  # Decides whether the macOS Rust job has anything to test. macOS minutes
  # bill at 10x Linux, and most changes here are frontend-only — `cargo test`
  # reads nothing outside src-tauri/, so a pure frontend diff doesn't need a
  # macOS runner. Unknown diff bases (force pushes, branch creation) fail
  # open to "changed" so the suite can never be skipped by accident.
  changes:
    name: Changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.diff.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Diff rust-relevant paths
        id: diff
        env:
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]] \
            || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE" HEAD -- src-tauri/ .github/workflows/desktop.yml | grep -q .; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

  rust:
    name: Tauri Rust tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: tauri-cargo-registry-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-cargo-registry-${{ runner.os }}-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: tauri-cargo-target-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-cargo-target-${{ runner.os }}-

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

# Coverage reruns of these suites live in coverage.yml (manual-only). They
# duplicated this workflow's jobs on a macOS runner for every push and PR
# sync, gated nothing (continue-on-error), and produced artifacts nothing
# downloads — the single largest Actions line item in the repo.
