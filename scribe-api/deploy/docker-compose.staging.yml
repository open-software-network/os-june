services:
  scribe-api:
    image: ${SCRIBE_IMAGE}
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    # App secrets are encrypted per-CVM via Phala sealed env (`phala envs`) and
    # injected at boot by ${VAR} interpolation — reference each one, unquoted.
    # An empty `KEY: ""` clobbers the sealed value with a blank; omitting the ref
    # injects nothing — both leave the app seeing the config as missing.
    # Docs: https://docs.phala.com/phala-cloud/phala-cloud-user-guides/create-cvm/set-secure-environment-variables
    # DSTACK_DOCKER_* (registry auth) is consumed by the prelaunch, not the app.
    environment:
      - RUST_LOG=scribe=info,scribe_api=info,scribe_services=info,scribe_providers=info,tower_http=info
      - SCRIBE__OS_ACCOUNTS__API_URL=${SCRIBE__OS_ACCOUNTS__API_URL}
      - SCRIBE__OS_ACCOUNTS__APP_API_KEY=${SCRIBE__OS_ACCOUNTS__APP_API_KEY}
      - SCRIBE__UPSTREAMS__OPENAI__API_KEY=${SCRIBE__UPSTREAMS__OPENAI__API_KEY}
      - SCRIBE__UPSTREAMS__VENICE__API_KEY=${SCRIBE__UPSTREAMS__VENICE__API_KEY}
      # Issue reports → os-platform tracker (key sealed; routing sealed too
      # so staging can target a sandbox org without a compose edit).
      - SCRIBE__ISSUE_REPORTS__OS_PLATFORM_API_URL=${SCRIBE__ISSUE_REPORTS__OS_PLATFORM_API_URL}
      - SCRIBE__ISSUE_REPORTS__OS_PLATFORM_ORG=${SCRIBE__ISSUE_REPORTS__OS_PLATFORM_ORG}
      - SCRIBE__ISSUE_REPORTS__OS_PLATFORM_PROJECT=${SCRIBE__ISSUE_REPORTS__OS_PLATFORM_PROJECT}
      - SCRIBE__ISSUE_REPORTS__OS_PLATFORM_REWARD_ASSET=${SCRIBE__ISSUE_REPORTS__OS_PLATFORM_REWARD_ASSET}
      - SCRIBE__ISSUE_REPORTS__OS_PLATFORM_API_KEY=${SCRIBE__ISSUE_REPORTS__OS_PLATFORM_API_KEY}
