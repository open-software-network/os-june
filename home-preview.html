<!doctype html>
<!--
  Dev-only preview for the June Home thread. Renders the real AgentWorkspace in
  homeMode against a faked Tauri IPC bridge: a persistent home session with
  history spanning several days (day markers), a delayed june_home_chat reply
  (typing dots), and a pre-seeded daily check-in so the serif greeting sits at
  today's boundary like it would in real use. Nothing here ships (vite builds
  only the configured entries). Usage: pnpm dev, open /home-preview.html.
  Add ?empty to see the first-open state (greeting + nudges only).
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>June Home preview</title>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const EMPTY = params.has("empty");
        if (params.get("theme")) {
          localStorage.setItem("os-june:theme", params.get("theme"));
        }

        // Neutralize the Hermes gateway websocket; Home's direct chat goes
        // through the june_home_chat command, not the gateway.
        window.WebSocket = class {
          constructor() {
            this.readyState = 0;
          }
          addEventListener() {}
          removeEventListener() {}
          send() {}
          close() {}
        };

        const HOME_SESSION_ID = "home-preview-session";
        const HOME_PROFILE = "home-preview";
        const now = new Date();
        const at = (daysAgo, hours, minutes) => {
          const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysAgo, hours, minutes);
          return d.toISOString();
        };
        // Today's fake turns hang off the real clock (minutes ago), never a
        // fixed morning hour: a fixed time can land in the future (open the
        // preview at 3 AM) and shuffle the sort under a just-sent message.
        // Clamped to shortly after local midnight so "minutes ago" never slips
        // into yesterday (which would flip the check-in greeting to evening).
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 1);
        const minutesAgo = (m) => {
          const real = now.getTime() - m * 60000;
          // Fallback keeps ordering: larger m still resolves earlier.
          const clamped = startOfToday.getTime() + (1440 - m) * 1000;
          return new Date(Math.max(real, clamped)).toISOString();
        };

        // Seed the daily check-in ahead of today's turns so the greeting lands
        // at today's boundary (its real position: Home opened before chatting).
        const dateKey =
          now.getFullYear() +
          "-" +
          String(now.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(now.getDate()).padStart(2, "0");
        const mergeStorageRecord = (key, value) => {
          let records = {};
          try {
            records = JSON.parse(localStorage.getItem(key) || "{}");
          } catch {}
          localStorage.setItem(key, JSON.stringify({ ...records, [HOME_PROFILE]: value }));
        };
        mergeStorageRecord("june:home:check-ins:v1", {
          date: dateKey,
          createdAt: minutesAgo(200),
        });
        mergeStorageRecord("june:home:session-ids:v1", HOME_SESSION_ID);
        // Direct-turn persistence from previous preview loads would double the
        // transcript. Clear only this preview's isolated record, never a real
        // local-development profile's Home data.
        for (const key of ["june.home.directTurns.v1", "june.home.taskHandoffs.v1"]) {
          let records = {};
          try {
            records = JSON.parse(localStorage.getItem(key) || "{}");
          } catch {}
          delete records[HOME_SESSION_ID];
          localStorage.setItem(key, JSON.stringify(records));
        }

        const HISTORY = EMPTY
          ? []
          : [
              {
                id: "m1",
                role: "user",
                content: "I stalled on The Maintenance Race again.",
                created_at: at(4, 16, 20),
              },
              {
                id: "m2",
                role: "assistant",
                content:
                  "Two chapters still counts. Want to talk through what lost you, or leave it alone for a week without turning it into homework?",
                created_at: at(4, 16, 21),
              },
              {
                id: "m3",
                role: "user",
                content: "How did the accounts migration land yesterday?",
                created_at: at(1, 9, 30),
              },
              {
                id: "m4",
                role: "assistant",
                content:
                  "I do not have the migration details in this thread. I can open a focused session to check the notes and give you a reliable answer.",
                created_at: at(1, 9, 31),
              },
              {
                id: "m5",
                role: "user",
                content: "Morning! Help me decide what to protect time for today.",
                created_at: minutesAgo(180),
              },
              {
                id: "m6",
                role: "assistant",
                content:
                  "The one thing you keep circling is the Home polish pass. Protect a clean hour for that before the reactive stuff gets loud.",
                created_at: minutesAgo(179),
              },
            ];

        const callbacks = new Map();
        let nextId = 1;
        const listeners = new Map();

        window.__TAURI_EVENT_PLUGIN_INTERNALS__ = {
          unregisterListener(event, eventId) {
            const set = listeners.get(event);
            if (set) set.delete(eventId);
          },
        };

        window.__TAURI_INTERNALS__ = {
          transformCallback(cb) {
            const id = nextId++;
            callbacks.set(id, cb);
            return id;
          },
          unregisterCallback(id) {
            callbacks.delete(id);
          },
          convertFileSrc(p) {
            return p;
          },
          async invoke(cmd, args = {}) {
            switch (cmd) {
              case "plugin:event|listen": {
                if (!listeners.has(args.event)) {
                  listeners.set(args.event, new Set());
                }
                listeners.get(args.event).add(args.handler);
                return args.handler;
              }
              case "plugin:event|unlisten":
                return null;
              case "os_accounts_status":
                return {
                  signedIn: true,
                  configured: true,
                  user: {
                    id: "usr_preview",
                    handle: "preview",
                    email: "preview@example.com",
                    displayName: "Preview",
                  },
                  balance: { credits: 5000, usdMillis: 5000 },
                  subscription: { subscribed: false },
                };
              case "hermes_bridge_sessions":
                return {
                  sessions: [
                    {
                      id: HOME_SESSION_ID,
                      title: "Home",
                      preview: "",
                      last_active: now.toISOString(),
                      message_count: HISTORY.length,
                    },
                  ],
                };
              case "hermes_bridge_session_messages": {
                const sessionId = args.request ? args.request.sessionId : args.sessionId;
                return { messages: sessionId === HOME_SESSION_ID ? HISTORY : [] };
              }
              case "list_session_profiles":
                return [{ sessionId: HOME_SESSION_ID, profile: HOME_PROFILE }];
              case "june_home_chat": {
                const content =
                  "I’m with you. Tell me which part feels heaviest, and we’ll make the next step smaller.";
                // A real delta sequence exercises the same Tauri Channel seam
                // as production instead of validating a one-shot imitation.
                await new Promise((resolve) => setTimeout(resolve, 700));
                for (const chunk of content.match(/.{1,18}(?:\s|$)/g) || [content]) {
                  args.onEvent?.onmessage?.({
                    event: "delta",
                    data: { content: chunk },
                  });
                  await new Promise((resolve) => setTimeout(resolve, 140));
                }
                return {
                  content,
                };
              }
              case "list_agent_tasks":
                return { items: [] };
              case "provider_model_settings":
                return {
                  settings: {
                    transcriptionProvider: "venice",
                    transcriptionModel: "nvidia/parakeet-tdt-0.6b-v3",
                    generationModel: "zai-org-glm-5-2",
                    imageModel: "venice-sd35",
                  },
                };
              case "list_venice_models":
                return {
                  mode: "generation",
                  modelType: "text",
                  selectedModel: "zai-org-glm-5-2",
                  models: [
                    {
                      provider: "venice",
                      id: "zai-org-glm-5-2",
                      name: "GLM 5.2",
                      modelType: "text",
                      privacy: "private",
                      traits: [],
                      capabilities: ["functionCalling"],
                    },
                  ],
                };
              case "hermes_bridge_status":
                return {
                  running: true,
                  connection: { port: 61234, wsUrl: "ws://127.0.0.1:61234" },
                };
              case "start_hermes_bridge":
                return {
                  running: true,
                  connection: { port: 61234, wsUrl: "ws://127.0.0.1:61234" },
                  connections: [{ port: 61234, wsUrl: "ws://127.0.0.1:61234" }],
                };
              case "hermes_agent_cli_access":
                return { enabled: false };
              case "hermes_browser_access":
                return { enabled: false };
              case "hermes_bridge_skills":
                return [];
              case "hermes_bridge_toolsets":
                return [];
              case "hermes_bridge_filesystem_snapshot":
                return { roots: [] };
              case "hermes_bridge_messaging_platforms":
                return { platforms: [] };
              case "browser_approvals_pending":
                return [];
              case "sticky_active_profile":
                return HOME_PROFILE;
              case "get_share_base_url":
                return "https://june.example/share";
              case "share_key_get":
                return null;
              case "generated_video_dir":
                return "/tmp/june-preview-videos";
              default:
                console.log("[preview] unstubbed invoke:", cmd, args);
                return null;
            }
          },
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/home-preview.tsx"></script>
  </body>
</html>
